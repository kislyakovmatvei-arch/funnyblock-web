<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Отображение QR-кода</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="info-container">
        <div class="qr-block">
            <!-- src="my-qr.png" берет картинку прямо из вашего репозитория -->
            <img src="my-qr.png" alt="QR-код" class="qr-code">
        </div>
        <div class="text-block">
            <h1>Для оплаты</h1>
            <p>отсканируйте QR-код в мобильном приложении банка или штатной камерой телефона</p>
        </div>
    </main>
</body>
</html>
