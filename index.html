<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BMJANG Mobile Edition</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; overflow: hidden; font-family: sans-serif;
            touch-action: none; /* Запрещаем скролл экрана пальцем */
        }
        /* Главный экран рендера */
        #gameCanvas {
            width: 100%; height: 100%; display: block; image-rendering: pixelated;
        }
        /* Интерфейс (HUD) */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;
        }
        #fps {
            position: absolute; top: 10px; right: 10px; color: #0f0; font-weight: bold; text-shadow: 1px 1px 0 #000;
        }
        #minimap {
            position: absolute; top: 10px; left: 10px; width: 100px; height: 100px;
            background: rgba(0,0,0,0.5); border: 2px solid #555;
        }
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 4px; height: 4px;
            background: white; transform: translate(-50%, -50%);
        }
        /* Мобильные кнопки */
        .controls { pointer-events: auto; position: absolute; bottom: 20px; }
        .btn {
            background: rgba(255, 255, 255, 0.2); border: 2px solid rgba(255,255,255,0.5);
            color: white; border-radius: 50%; width: 60px; height: 60px;
            display: flex; justify-content: center; align-items: center;
            font-size: 24px; user-select: none; active: background: rgba(255,255,255,0.5);
        }
        /* Левый блок (Ходьба) */
        #left-controls { left: 20px; display: grid; grid-template-columns: 60px; gap: 10px; }
        /* Правый блок (Камера и действия) */
        #right-controls { right: 20px; display: grid; grid-template-columns: 60px 60px; gap: 10px; }
        .row { display: flex; justify-content: center; gap: 10px; }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="640" height="360"></canvas>
    
    <div id="ui-layer">
        <canvas id="minimap" width="32" height="32"></canvas>
        <div id="fps">FPS: 0</div>
        <div id="crosshair"></div>

        <div class="controls" id="left-controls">
            <div class="btn" id="btn-up">🔼</div>
            <div class="btn" id="btn-down">🔽</div>
        </div>

        <div class="controls" id="right-controls">
            <div class="btn" id="btn-left">◀️</div>
            <div class="btn" id="btn-right">▶️</div>
            <div class="btn" id="btn-mine">⛏️</div>
            <div class="btn" id="btn-place">🧱</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        const minimap = document.getElementById('minimap');
        const mCtx = minimap.getContext('2d');
        const fpsDiv = document.getElementById('fps');

        // Параметры экрана
        const W = canvas.width;
        const H = canvas.height;

        // Игрок
        let posX = 16.5, posY = 16.5;
        let dirX = -1.0, dirY = 0.0;
        let planeX = 0.0, planeY = 0.66;
        let isWalking = false;

        // Мир
        const MAP_SIZE = 32;
        let world = [];
        
        // Цвета блоков
        const colors = {
            1: '#8B5A2B', // Земля
            2: '#808080', // Камень
            3: '#5C3A21', // Дерево
            4: '#228B22', // Листва
            5: '#FFD700'  // Золото
        };
        const colorsDark = {
            1: '#654321', 2: '#606060', 3: '#3D2616', 4: '#186A18', 5: '#C8A200'
        };

        // Генерация мира (с редким золотом)
        for(let i=0; i<MAP_SIZE; i++) {
            world[i] = [];
            for(let j=0; j<MAP_SIZE; j++) {
                if (i>=14 && i<=18 && j>=14 && j<=18) {
                    world[i][j] = 0; // Пустой спавн
                    continue;
                }
                let val = Math.sin(i * 0.4) * Math.cos(j * 0.4) + Math.cos(i * 0.2 + j * 0.5);
                if (val > 0.7) {
                    world[i][j] = (Math.random() * 15 < 1) ? 5 : 2; // Золото или Камень
                } else if (val > 0.4) {
                    if ((i * i + j) % 7 === 0) world[i][j] = 3;
                    else if ((i + j * j) % 5 === 0) world[i][j] = 4;
                    else world[i][j] = 1;
                } else {
                    world[i][j] = 0;
                }
            }
        }

        // Состояние кнопок управления
        const input = { up: false, down: false, left: false, right: false };

        function bindBtn(id, key) {
            const el = document.getElementById(id);
            el.addEventListener('touchstart', (e) => { e.preventDefault(); input[key] = true; el.style.background = "rgba(255,255,255,0.6)"; });
            el.addEventListener('touchend', (e) => { e.preventDefault(); input[key] = false; el.style.background = "rgba(255,255,255,0.2)"; });
            el.addEventListener('mousedown', (e) => { e.preventDefault(); input[key] = true; el.style.background = "rgba(255,255,255,0.6)"; });
            el.addEventListener('mouseup', (e) => { e.preventDefault(); input[key] = false; el.style.background = "rgba(255,255,255,0.2)"; });
        }

        bindBtn('btn-up', 'up');
        bindBtn('btn-down', 'down');
        bindBtn('btn-left', 'left');
        bindBtn('btn-right', 'right');

        // Действия (Ломать / Строить)
        document.getElementById('btn-mine').addEventListener('pointerdown', () => {
            let tx = Math.floor(posX + dirX * 1.5);
            let ty = Math.floor(posY + dirY * 1.5);
            if (tx >= 0 && tx < MAP_SIZE && ty >= 0 && ty < MAP_SIZE && world[tx][ty] > 0) {
                world[tx][ty] = 0;
            }
        });

        document.getElementById('btn-place').addEventListener('pointerdown', () => {
            let tx = Math.floor(posX + dirX * 1.5);
            let ty = Math.floor(posY + dirY * 1.5);
            let px = Math.floor(posX), py = Math.floor(posY);
            if (tx >= 0 && tx < MAP_SIZE && ty >= 0 && ty < MAP_SIZE && world[tx][ty] === 0) {
                if (tx !== px || ty !== py) world[tx][ty] = 1; // Земля
            }
        });

        // FPS
        let lastTime = performance.now();
        let frameCount = 0;

        function gameLoop() {
            let now = performance.now();
            let dt = (now - lastTime) / 1000;
            
            frameCount++;
            if (frameCount % 10 === 0) {
                fpsDiv.innerText = "FPS: " + Math.floor(1 / dt);
            }
            lastTime = now;

            // Движение
            let moveSpeed = 3.0 * dt;
            let rotSpeed = 2.0 * dt;
            let margin = 0.3;

            isWalking = false;

            if (input.up) {
                if (world[Math.floor(posX + dirX * moveSpeed + (dirX>0?margin:-margin))][Math.floor(posY)] === 0) posX += dirX * moveSpeed;
                if (world[Math.floor(posX)][Math.floor(posY + dirY * moveSpeed + (dirY>0?margin:-margin))] === 0) posY += dirY * moveSpeed;
                isWalking = true;
            }
            if (input.down) {
                if (world[Math.floor(posX - dirX * moveSpeed - (dirX>0?margin:-margin))][Math.floor(posY)] === 0) posX -= dirX * moveSpeed;
                if (world[Math.floor(posX)][Math.floor(posY - dirY * moveSpeed - (dirY>0?margin:-margin))] === 0) posY -= dirY * moveSpeed;
                isWalking = true;
            }
            if (input.right) {
                let oldDirX = dirX;
                dirX = dirX * Math.cos(-rotSpeed) - dirY * Math.sin(-rotSpeed);
                dirY = oldDirX * Math.sin(-rotSpeed) + dirY * Math.cos(-rotSpeed);
                let oldPlaneX = planeX;
                planeX = planeX * Math.cos(-rotSpeed) - planeY * Math.sin(-rotSpeed);
                planeY = oldPlaneX * Math.sin(-rotSpeed) + planeY * Math.cos(-rotSpeed);
            }
            if (input.left) {
                let oldDirX = dirX;
                dirX = dirX * Math.cos(rotSpeed) - dirY * Math.sin(rotSpeed);
                dirY = oldDirX * Math.sin(rotSpeed) + dirY * Math.cos(rotSpeed);
                let oldPlaneX = planeX;
                planeX = planeX * Math.cos(rotSpeed) - planeY * Math.sin(rotSpeed);
                planeY = oldPlaneX * Math.sin(rotSpeed) + planeY * Math.cos(rotSpeed);
            }

            // Отрисовка
            let bobbing = isWalking ? Math.sin(now / 150.0) * 8.0 : 0;

            // Небо и земля (градиент)
            let skyGradient = ctx.createLinearGradient(0, 0, 0, H/2 + bobbing);
            skyGradient.addColorStop(0, "#4a90e2");
            skyGradient.addColorStop(1, "#87ceeb");
            ctx.fillStyle = skyGradient;
            ctx.fillRect(0, 0, W, H / 2 + bobbing);

            ctx.fillStyle = "#556b2f";
            ctx.fillRect(0, H / 2 + bobbing, W, H / 2 - bobbing);

            // Raycasting
            for (let x = 0; x < W; x += 2) {
                let cameraX = 2 * x / W - 1;
                let rDX = dirX + planeX * cameraX;
                let rDY = dirY + planeY * cameraX;
                let mX = Math.floor(posX), mY = Math.floor(posY);
                let dDX = Math.abs(1 / rDX);
                let dDY = Math.abs(1 / rDY);
                let sDX, sDY, pWD;
                let stX, stY, hit = 0, side, hitType = 0;

                if (rDX < 0) { stX = -1; sDX = (posX - mX) * dDX; }
                else { stX = 1; sDX = (mX + 1.0 - posX) * dDX; }
                if (rDY < 0) { stY = -1; sDY = (posY - mY) * dDY; }
                else { stY = 1; sDY = (mY + 1.0 - posY) * dDY; }

                while (hit === 0) {
                    if (sDX < sDY) { sDX += dDX; mX += stX; side = 0; }
                    else { sDY += dDY; mY += stY; side = 1; }
                    
                    if(mX < 0 || mX >= MAP_SIZE || mY < 0 || mY >= MAP_SIZE) {
                        hit = 1; hitType = 2; // Границы карты = камень
                    } else if (world[mX][mY] > 0) {
                        hit = 1; hitType = world[mX][mY];
                    }
                }

                pWD = (side === 0) ? (sDX - dDX) : (sDY - dDY);
                let lH = Math.floor(H / pWD);
                let start = H / 2 + 5 + bobbing - lH / 2;
                if (start < 0) start = 0;
                let end = start + lH;
                if (end >= H) end = H - 1;

                ctx.fillStyle = (side === 0) ? colors[hitType] : colorsDark[hitType];
                ctx.fillRect(x, start, 2, end - start);
            }

            // Обновление Мини-карты
            mCtx.fillStyle = "#000";
            mCtx.fillRect(0, 0, 32, 32);
            for(let i=0; i<MAP_SIZE; i++) {
                for(let j=0; j<MAP_SIZE; j++) {
                    if(world[i][j] > 0) {
                        mCtx.fillStyle = colorsDark[world[i][j]];
                        mCtx.fillRect(i, j, 1, 1);
                    }
                }
            }
            mCtx.fillStyle = "red";
            mCtx.fillRect(Math.floor(posX), Math.floor(posY), 1, 1);

            requestAnimationFrame(gameLoop);
        }

        // Запуск
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
