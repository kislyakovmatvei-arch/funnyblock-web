<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Демонстрация QR-кода</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card-container">
        <h1 class="title">Сканируйте QR-код</h1>
        <p class="description">Используйте камеру вашего устройства для сканирования кода ниже.</p>
        
        <div class="qr-wrapper">
            <!-- Замените placeholder-картинку на ваш настоящий QR-код -->
            <img id="qr-image" src="https://qrserver.com" alt="QR Code">
        </div>

        <button id="action-btn" class="btn">Обновить код</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
